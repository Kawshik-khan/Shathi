services:
  - type: web
    name: shathi-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: RUN_MIGRATIONS
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_API_TOKEN
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: sathi-memories
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://shathi.vercel.app
      - key: CORS_ALLOW_METHODS
        value: GET,POST,PUT,PATCH,DELETE,OPTIONS
      - key: CORS_ALLOW_HEADERS
        value: Authorization,Content-Type,Accept,Origin,Referer,User-Agent,X-Requested-With,X-CSRF-Protection
      - key: CORS_EXPOSE_HEADERS
        value: X-Request-ID,X-RateLimit-Remaining,X-RateLimit-Reset
      - key: CORS_MAX_AGE_SECONDS
        value: "600"
