services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sathi-backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      DEBUG: "true"
      PORT: "8000"
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

